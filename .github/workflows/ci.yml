name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup tools
        uses: jdx/mise-action@v4
        with:
          install_args: node

      - name: Install dependencies
        run: npm ci

      - name: Install example dependencies
        run: |
          npm ci --prefix examples/browser
          npm ci --prefix examples/expo
          npm ci --prefix examples/node

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  test-js:
    name: Test JS
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup tools
        uses: jdx/mise-action@v4
        with:
          install_args: node

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

  test-rust:
    name: Test Rust
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup tools
        uses: jdx/mise-action@v4

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust -> target"

      - name: Test
        run: cargo test --manifest-path rust/Cargo.toml --workspace

  build:
    name: Build
    runs-on: macos-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup tools
        uses: jdx/mise-action@v4

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust -> target"
          key: wasm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  bindings-smoke:
    name: Bindings (FFI + Go + Python + C++)
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/rust/target
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup tools
        uses: jdx/mise-action@v4

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust -> target"

      - name: Build FFI staticlib
        run: cargo build -p aptos_confidential_asset_ffi --release --manifest-path rust/Cargo.toml

      - name: Stage native lib for CGO (mirrors go generate output)
        run: |
          TRIPLE="x86_64-unknown-linux-gnu"
          DEST="bindings/go/aptosconfidential/native/${TRIPLE}"
          mkdir -p "$DEST"
          cp rust/target/release/libaptos_confidential_asset_ffi.a "$DEST/"
          cp rust/ffi/include/aptos_confidential_asset.h "$DEST/"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Go bindings (golden + smoke)
        env:
          CGO_ENABLED: "1"
        run: |
          cd bindings/go
          go test -v ./aptosconfidential/...
          cd ../../examples/go
          go test -v .

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python maturin + pytest
        run: |
          cd bindings/python
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install maturin pytest
          maturin develop --release
          pytest tests -v

      - name: C++ example
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake
          cd examples/cpp
          cmake -B build -S .
          cmake --build build
          ./build/demo

  build-python-wheel:
    name: Build Python wheel (manylinux check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          target: x86_64-unknown-linux-gnu
          manylinux: manylinux_2_28
          args: --release --out dist
          sccache: "true"

      - name: Verify abi3 wheel
        run: ls bindings/python/dist/ | grep -E 'cp39-abi3'

  zig-smoke:
    name: Bindings (Zig smoke)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/rust/target
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup tools
        uses: jdx/mise-action@v4

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust -> target"

      - name: Install Zig
        run: |
          ZIG_VER=0.13.0
          curl -sSL "https://ziglang.org/download/${ZIG_VER}/zig-linux-x86_64-${ZIG_VER}.tar.xz" | tar -xJ
          echo "$PWD/zig-linux-x86_64-${ZIG_VER}" >> "$GITHUB_PATH"

      - name: Build FFI + Zig
        run: |
          cargo build -p aptos_confidential_asset_ffi --release --manifest-path rust/Cargo.toml
          cd bindings/zig
          zig build
