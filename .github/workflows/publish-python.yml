name: Publish Python bindings

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish_to_pypi:
        description: "Upload wheels to PyPI (requires OIDC Trusted Publisher or PYPI_API_TOKEN)"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-python-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            manylinux: manylinux_2_28
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            manylinux: manylinux_2_28
          - target: universal2-apple-darwin
            os: macos-latest
            manylinux: "off"
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            manylinux: "off"

    steps:
      - uses: actions/checkout@v4

      - uses: PyO3/maturin-action@v1
        with:
          working-directory: bindings/python
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist --interpreter 3.9 3.10 3.11 3.12 3.13
          sccache: "true"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: bindings/python/dist/*.whl

  publish:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_to_pypi)
    environment:
      name: pypi
      url: https://pypi.org/p/aptos-confidential-asset-bindings-experimental
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
