# npm / JS package only — opens "Version Packages" PR or publishes via Changesets.
# Native FFI binaries use workflow "Release native FFI binaries" (bindings-release.yml).
name: Release npm (Changesets)

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    # changesets/action creates a PR via the REST API. Default github.token is blocked
    # unless the repo enables PR creation for Actions (Settings → Actions → General).
    # If it still fails on a fork, add repo secret CHANGESETS_GITHUB_TOKEN (classic PAT
    # with `repo`, or fine-grained with Contents + Pull requests write on this repo).
    name: Release
    runs-on: macos-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.CHANGESETS_GITHUB_TOKEN || github.token }}

      - name: Setup tools
        uses: jdx/mise-action@v4

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust -> target"
          key: wasm-release

      - name: Install dependencies
        run: npm ci

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: npm run version
          publish: npm run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_GITHUB_TOKEN || github.token }}
